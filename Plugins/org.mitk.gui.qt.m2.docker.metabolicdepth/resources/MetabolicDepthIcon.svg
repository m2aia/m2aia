<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="100"
   height="100"
   viewBox="0 0 100 100"
   version="1.1"
   xmlns="http://www.w3.org/2000/svg">

  <!--
    MetabolicDepth icon — MoleculaRIcon style
    Layered molecular network representing depth-dependent metabolic activity.
    Top layer (shallow):  bright green  #00ff00  — high metabolic activity
    Middle layer:         cyan-green    #44ddbb  — intermediate
    Bottom layer (deep):  magenta       #ff00ff  — deep / low activity
    Vertical depth arrow on left edge.
  -->

  <!-- ── depth arrow (left side) ── -->
  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
      <polygon points="0,0 6,3 0,6" fill="#333"/>
    </marker>
  </defs>
  <line x1="11" y1="16" x2="11" y2="80" stroke="#333" stroke-width="1.8" marker-end="url(#arr)" stroke-linecap="round"/>
  <!-- tick labels -->
  <line x1="8"  y1="22" x2="14" y2="22" stroke="#333" stroke-width="1.2"/>
  <line x1="8"  y1="50" x2="14" y2="50" stroke="#333" stroke-width="1.2"/>
  <line x1="8"  y1="78" x2="14" y2="78" stroke="#333" stroke-width="1.2"/>

  <!-- ── inter-layer bonds (drawn first so nodes sit on top) ── -->
  <!-- top ↔ mid -->
  <line x1="33" y1="22" x2="37" y2="50" stroke="#222" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="55" y1="20" x2="55" y2="50" stroke="#222" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="77" y1="22" x2="73" y2="50" stroke="#222" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="33" y1="22" x2="55" y2="50" stroke="#222" stroke-width="1.0" stroke-linecap="round" stroke-opacity="0.4"/>
  <line x1="77" y1="22" x2="55" y2="50" stroke="#222" stroke-width="1.0" stroke-linecap="round" stroke-opacity="0.4"/>

  <!-- mid ↔ bottom -->
  <line x1="37" y1="50" x2="33" y2="78" stroke="#222" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="55" y1="50" x2="55" y2="78" stroke="#222" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="73" y1="50" x2="77" y2="78" stroke="#222" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="37" y1="50" x2="55" y2="78" stroke="#222" stroke-width="1.0" stroke-linecap="round" stroke-opacity="0.4"/>
  <line x1="73" y1="50" x2="55" y2="78" stroke="#222" stroke-width="1.0" stroke-linecap="round" stroke-opacity="0.4"/>

  <!-- ── intra-layer bonds ── -->
  <!-- top layer -->
  <line x1="33" y1="22" x2="55" y2="20" stroke="#222" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="55" y1="20" x2="77" y2="22" stroke="#222" stroke-width="1.8" stroke-linecap="round"/>
  <!-- mid layer -->
  <line x1="37" y1="50" x2="55" y2="50" stroke="#222" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="55" y1="50" x2="73" y2="50" stroke="#222" stroke-width="1.8" stroke-linecap="round"/>
  <!-- bottom layer -->
  <line x1="33" y1="78" x2="55" y2="78" stroke="#222" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="55" y1="78" x2="77" y2="78" stroke="#222" stroke-width="1.8" stroke-linecap="round"/>

  <!-- ── TOP layer nodes — green (#00ff00) ── -->
  <circle cx="33" cy="22" r="5.5" fill="#00ff00" stroke="#000" stroke-width="1.8"/>
  <circle cx="55" cy="20" r="5.5" fill="#00ff00" stroke="#000" stroke-width="1.8"/>
  <circle cx="77" cy="22" r="5.5" fill="#00ff00" stroke="#000" stroke-width="1.8"/>

  <!-- ── MID layer nodes — cyan-green (#44ddbb) ── -->
  <circle cx="37" cy="50" r="5.5" fill="#44ddbb" stroke="#000" stroke-width="1.8"/>
  <circle cx="55" cy="50" r="5.5" fill="#44ddbb" stroke="#000" stroke-width="1.8"/>
  <circle cx="73" cy="50" r="5.5" fill="#44ddbb" stroke="#000" stroke-width="1.8"/>

  <!-- ── BOTTOM layer nodes — magenta (#ff00ff) ── -->
  <circle cx="33" cy="78" r="5.5" fill="#ff00ff" stroke="#000" stroke-width="1.8"/>
  <circle cx="55" cy="78" r="5.5" fill="#ff00ff" stroke="#000" stroke-width="1.8"/>
  <circle cx="77" cy="78" r="5.5" fill="#ff00ff" stroke="#000" stroke-width="1.8"/>

  <!-- ── depth label ── -->
  <text x="7" y="95" font-size="6.5" font-family="sans-serif" fill="#333" text-anchor="middle"
        transform="rotate(-90,7,95) translate(0,0)">depth</text>

</svg>
