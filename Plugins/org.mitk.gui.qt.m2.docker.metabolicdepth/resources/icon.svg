<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#4A90E2" stroke="#2E5C8A" stroke-width="2"/>
  
  <!-- Gradient representation - horizontal lines showing depth -->
  <g transform="translate(20, 25)">
    <!-- Top layer (shallow) -->
    <rect x="0" y="0" width="60" height="8" fill="#FFE066" opacity="0.9"/>
    <!-- Middle layer -->
    <rect x="0" y="12" width="60" height="8" fill="#FFA500" opacity="0.9"/>
    <!-- Deep layer -->
    <rect x="0" y="24" width="60" height="8" fill="#FF6347" opacity="0.9"/>
    <!-- Deepest layer -->
    <rect x="0" y="36" width="60" height="8" fill="#8B0000" opacity="0.9"/>
  </g>
  
  <!-- Depth arrow -->
  <g transform="translate(15, 30)">
    <line x1="0" y1="0" x2="0" y2="40" stroke="white" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="-12" y="20" fill="white" font-size="10" font-family="Arial" transform="rotate(-90, -8, 20)">Depth</text>
  </g>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="white"/>
    </marker>
  </defs>
  
  <!-- Letter "M" for Metabolic -->
  <text x="50" y="90" font-size="24" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">M</text>
</svg>
