<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   width="100"
   height="100"
   viewBox="0 0 100 100"
   version="1.1"
   xmlns="http://www.w3.org/2000/svg">

  <!--
    Volcano plot icon — MoleculaRIcon style
    X-axis: log2(fold change)   Y-axis: −log10(p-value)
    Upregulated   (high +FC, high sig): magenta  #ff00ff
    Downregulated (high −FC, high sig): green    #00ff00
    Non-significant (centre):           grey     #aaaaaa
  -->

  <!-- ── axes ── -->
  <defs>
    <marker id="ax" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto">
      <polygon points="0,0 5,2.5 0,5" fill="#222"/>
    </marker>
  </defs>
  <!-- Y axis -->
  <line x1="18" y1="88" x2="18" y2="10" stroke="#222" stroke-width="2.0"
        stroke-linecap="round" marker-end="url(#ax)"/>
  <!-- X axis -->
  <line x1="10" y1="88" x2="92" y2="88" stroke="#222" stroke-width="2.0"
        stroke-linecap="round" marker-end="url(#ax)"/>

  <!-- ── threshold lines (dashed) ── -->
  <!-- horizontal significance threshold (p-value) -->
  <line x1="18" y1="52" x2="90" y2="52" stroke="#666" stroke-width="1.0"
        stroke-dasharray="3,2.5"/>
  <!-- vertical FC thresholds -->
  <line x1="38" y1="14" x2="38" y2="88" stroke="#666" stroke-width="1.0"
        stroke-dasharray="3,2.5"/>
  <line x1="68" y1="14" x2="68" y2="88" stroke="#666" stroke-width="1.0"
        stroke-dasharray="3,2.5"/>

  <!-- ── non-significant nodes (grey, centre cloud) ── -->
  <circle cx="44" cy="72" r="3.2" fill="#aaaaaa" stroke="#333" stroke-width="1.2"/>
  <circle cx="50" cy="68" r="3.2" fill="#aaaaaa" stroke="#333" stroke-width="1.2"/>
  <circle cx="56" cy="73" r="3.2" fill="#aaaaaa" stroke="#333" stroke-width="1.2"/>
  <circle cx="47" cy="62" r="3.0" fill="#aaaaaa" stroke="#333" stroke-width="1.2"/>
  <circle cx="55" cy="60" r="3.0" fill="#aaaaaa" stroke="#333" stroke-width="1.2"/>
  <circle cx="53" cy="75" r="2.8" fill="#aaaaaa" stroke="#333" stroke-width="1.2"/>

  <!-- ── upregulated nodes (right, magenta #ff00ff) ── -->
  <!-- below threshold (smaller) -->
  <circle cx="74" cy="65" r="3.2" fill="#ff00ff" stroke="#000" stroke-width="1.5"/>
  <circle cx="80" cy="68" r="3.0" fill="#ff00ff" stroke="#000" stroke-width="1.5"/>
  <!-- above threshold (larger, more significant) -->
  <circle cx="76" cy="40" r="4.2" fill="#ff00ff" stroke="#000" stroke-width="1.8"/>
  <circle cx="83" cy="30" r="4.5" fill="#ff00ff" stroke="#000" stroke-width="1.8"/>
  <circle cx="72" cy="24" r="4.8" fill="#ff00ff" stroke="#000" stroke-width="1.8"/>
  <circle cx="87" cy="44" r="3.8" fill="#ff00ff" stroke="#000" stroke-width="1.8"/>

  <!-- ── downregulated nodes (left, green #00ff00) ── -->
  <!-- below threshold -->
  <circle cx="24" cy="63" r="3.2" fill="#00ff00" stroke="#000" stroke-width="1.5"/>
  <circle cx="30" cy="68" r="3.0" fill="#00ff00" stroke="#000" stroke-width="1.5"/>
  <!-- above threshold -->
  <circle cx="26" cy="38" r="4.2" fill="#00ff00" stroke="#000" stroke-width="1.8"/>
  <circle cx="20" cy="28" r="4.5" fill="#00ff00" stroke="#000" stroke-width="1.8"/>
  <circle cx="32" cy="22" r="4.8" fill="#00ff00" stroke="#000" stroke-width="1.8"/>
  <circle cx="22" cy="44" r="3.8" fill="#00ff00" stroke="#000" stroke-width="1.8"/>

</svg>
